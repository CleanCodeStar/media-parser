{% extends "admin_modern/base.html" %}

{% block title %}视频文件管理 - Ucmao Admin{% endblock %}

{% block content %}
<div class="mb-8 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
    <div>
        <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">视频文件管理</h1>
        <p class="text-slate-500 mt-1">查看并管理服务器本地缓存的视频文件，支持清理孤儿文件与批量删除。</p>
    </div>
</div>

<div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6" id="storage-stats">
    <div class="bg-white rounded-3xl p-5 shadow-sm border border-slate-100">
        <div class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">总文件数</div>
        <div class="text-2xl font-extrabold text-slate-800" id="stat-total-files">-</div>
    </div>
    <div class="bg-white rounded-3xl p-5 shadow-sm border border-slate-100">
        <div class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">总占用空间</div>
        <div class="text-2xl font-extrabold text-slate-800" id="stat-total-size">-</div>
    </div>
    <div class="bg-white rounded-3xl p-5 shadow-sm border border-slate-100">
        <div class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">有库记录</div>
        <div class="text-2xl font-extrabold text-emerald-600" id="stat-in-db">-</div>
    </div>
    <div class="bg-white rounded-3xl p-5 shadow-sm border border-slate-100">
        <div class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">孤儿文件</div>
        <div class="text-2xl font-extrabold text-rose-600" id="stat-orphan">-</div>
    </div>
</div>

<div class="mb-4 flex flex-wrap gap-3 items-center">
    <button onclick="reloadStorage()" class="px-4 py-2.5 bg-indigo-600 text-white rounded-2xl font-bold hover:bg-indigo-700 transition-all shadow-md shadow-indigo-100 flex items-center text-sm">
        <i class="fas fa-rotate mr-2"></i>刷新列表
    </button>
    <button onclick="deleteSelected(false)" class="px-4 py-2.5 bg-slate-100 text-slate-600 rounded-2xl font-bold hover:bg-slate-200 transition-all flex items-center text-sm">
        <i class="fas fa-trash-alt mr-2"></i>仅删除选中文件
    </button>
    <button onclick="deleteSelected(true)" class="px-4 py-2.5 bg-rose-50 text-rose-600 rounded-2xl font-bold hover:bg-rose-100 transition-all flex items-center text-sm">
        <i class="fas fa-trash-can mr-2"></i>删除选中文件 + 数据库记录
    </button>
    <button onclick="cleanupOrphans()" class="px-4 py-2.5 bg-amber-50 text-amber-700 rounded-2xl font-bold hover:bg-amber-100 transition-all flex items-center text-sm">
        <i class="fas fa-broom mr-2"></i>一键清理孤儿文件
    </button>
    <div class="text-xs text-slate-400 ml-auto">
        仅系统管理员可执行删除操作
    </div>
</div>

<div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
    <div class="overflow-x-auto">
        <table class="w-full text-left">
            <thead class="bg-slate-50/50 text-slate-500 text-xs font-bold uppercase tracking-widest">
                <tr>
                    <th class="px-4 py-3 w-10">
                        <input type="checkbox" id="select-all-storage" class="w-4 h-4 rounded border-slate-300 text-indigo-600 focus:ring-indigo-500" onclick="toggleAllStorage(this)">
                    </th>
                    <th class="px-4 py-3">Video ID</th>
                    <th class="px-4 py-3">文件名</th>
                    <th class="px-4 py-3 text-right">大小</th>
                    <th class="px-4 py-3">在库状态</th>
                    <th class="px-4 py-3">标题 (如有)</th>
                </tr>
            </thead>
            <tbody id="storage-body" class="divide-y divide-slate-50">
                <tr>
                    <td colspan="6" class="px-8 py-16 text-center text-slate-400 text-sm">正在加载数据...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    let storageData = [];

    function formatBytes(bytes) {
        if (!bytes || bytes <= 0) return '0 B';
        const k = 1024;
        const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        const value = bytes / Math.pow(k, i);
        return value.toFixed(value >= 10 ? 1 : 2) + ' ' + sizes[i];
    }

    function renderStorageTable() {
        const tbody = document.getElementById('storage-body');
        if (!storageData.length) {
            tbody.innerHTML = '<tr><td colspan="6" class="px-8 py-16 text-center text-slate-400 text-sm">当前没有任何视频缓存文件。</td></tr>';
            return;
        }

        tbody.innerHTML = storageData.map(file => {
            const statusBadge = file.in_db
                ? '<span class="px-3 py-1 bg-emerald-50 text-emerald-600 rounded-full text-xs font-bold">有库记录</span>'
                : '<span class="px-3 py-1 bg-rose-50 text-rose-600 rounded-full text-xs font-bold">孤儿文件</span>';
            const titleText = file.title ? file.title : '<span class="text-slate-300 text-xs">无</span>';
            return `
                <tr class="hover:bg-slate-50/50 transition-colors">
                    <td class="px-4 py-3">
                        <input type="checkbox" class="storage-checkbox w-4 h-4 rounded border-slate-300 text-indigo-600 focus:ring-indigo-500" value="${file.video_id}">
                    </td>
                    <td class="px-4 py-3 font-mono text-xs text-slate-600">${file.video_id}</td>
                    <td class="px-4 py-3 text-sm text-slate-700">${file.filename}</td>
                    <td class="px-4 py-3 text-right text-sm font-medium text-slate-600">${formatBytes(file.size_bytes)}</td>
                    <td class="px-4 py-3">${statusBadge}</td>
                    <td class="px-4 py-3 text-sm">${titleText}</td>
                </tr>
            `;
        }).join('');
    }

    function updateStats(stats) {
        document.getElementById('stat-total-files').innerText = stats.total_files;
        document.getElementById('stat-total-size').innerText = formatBytes(stats.total_size_bytes);
        document.getElementById('stat-in-db').innerText = stats.in_db_count;
        document.getElementById('stat-orphan').innerText = stats.orphan_count;
    }

    function reloadStorage() {
        const tbody = document.getElementById('storage-body');
        tbody.innerHTML = '<tr><td colspan="6" class="px-8 py-16 text-center text-slate-400 text-sm">正在加载数据...</td></tr>';
        fetch("{{ url_for('admin_modern.storage_list') }}")
            .then(r => r.json())
            .then(data => {
                if (!data.success) {
                    showToast(data.message || '加载失败', 'error');
                    return;
                }
                storageData = data.files || [];
                updateStats(data.stats || { total_files: 0, total_size_bytes: 0, in_db_count: 0, orphan_count: 0 });
                renderStorageTable();
            })
            .catch(() => {
                showToast('加载失败，请稍后重试', 'error');
            });
    }

    function getSelectedVideoIds() {
        return Array.from(document.querySelectorAll('.storage-checkbox:checked')).map(el => el.value);
    }

    function toggleAllStorage(source) {
        const checked = source.checked;
        document.querySelectorAll('.storage-checkbox').forEach(el => {
            el.checked = checked;
        });
    }

    function deleteSelected(deleteDb) {
        const userRole = "{{ session.get('admin_role', 'viewer') }}";
        if (userRole !== 'admin') {
            return showToast('权限不足：仅系统管理员可执行此操作', 'error');
        }

        const videoIds = getSelectedVideoIds();
        if (!videoIds.length) {
            return showToast('请先选择要删除的文件', 'error');
        }

        const msg = deleteDb
            ? `确定要删除选中的 ${videoIds.length} 个文件，并同步删除对应的数据库记录吗？此操作不可撤销。`
            : `确定要仅删除选中的 ${videoIds.length} 个本地文件吗？数据库记录将保留，可在下次下载时重新缓存。`;

        showConfirm(msg, () => {
            fetch("{{ url_for('admin_modern.delete_storage') }}", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ video_ids: videoIds, delete_db: deleteDb })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    showToast(`删除完成：文件 ${data.deleted_files} 个，数据库记录 ${data.deleted_db || 0} 条`);
                    reloadStorage();
                } else {
                    showToast(data.message || '删除失败', 'error');
                }
            })
            .catch(() => {
                showToast('删除失败，请稍后重试', 'error');
            });
        });
    }

    function cleanupOrphans() {
        const userRole = "{{ session.get('admin_role', 'viewer') }}";
        if (userRole !== 'admin') {
            return showToast('权限不足：仅系统管理员可执行此操作', 'error');
        }

        showConfirm('确定要一键清理所有孤儿文件吗？仅删除没有数据库记录的本地缓存文件。', () => {
            fetch("{{ url_for('admin_modern.cleanup_orphans') }}", {
                method: 'POST'
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    showToast(`已删除 ${data.deleted_files} 个孤儿文件`);
                    reloadStorage();
                } else {
                    showToast(data.message || '清理失败', 'error');
                }
            })
            .catch(() => {
                showToast('清理失败，请稍后重试', 'error');
            });
        });
    }

    document.addEventListener('DOMContentLoaded', reloadStorage);
</script>
{% endblock %}
