
services:
  media-parser-backend:
    build: .
    container_name: media-parser-backend
    restart: always
    networks:
      - ink-away-network
    ports:
      - "8051:8051"
    volumes:
      # 将宿主机上的日志、静态视频目录映射，以便容器删除和重建时不丢失数据或便于排查问题
      - ./static/videos:/app/static/videos
      - ./logs:/app/logs
    # 设置容器内的时区为本地时区
    environment:
      - TZ=Asia/Shanghai
    # 限制日志大小，防止生产环境磁盘爆满 (Log Rotation)
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  ink-away-network:
    driver: bridge